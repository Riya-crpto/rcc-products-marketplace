<!DOCTYPE html>
<html>
<head>
    <title>Admin Panel - AP Group</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; background: #f0f0f0; padding: 20px; }
        .container { max-width: 800px; margin: 0 auto; background: white; padding: 30px; border-radius: 8px; }
        h1 { color: #333; margin-bottom: 20px; }
        h2 { color: #666; margin-top: 25px; margin-bottom: 15px; font-size: 16px; }
        
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; font-size: 14px; }
        input, textarea { padding: 10px; width: 100%; max-width: 400px; border: 1px solid #ddd; border-radius: 4px; font-size: 14px; font-family: Arial; }
        button { padding: 10px 20px; background: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 14px; margin-right: 10px; }
        button:hover { background: #0056b3; }
        button.logout { background: #dc3545; margin-top: 20px; }
        
        .hidden { display: none; }
        .msg { padding: 10px; margin: 10px 0; border-radius: 4px; font-size: 14px; }
        .msg.success { background: #d4edda; color: #155724; }
        .msg.error { background: #f8d7da; color: #721c24; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 15px; font-size: 13px; }
        table th, table td { border: 1px solid #ddd; padding: 8px; text-align: left; }
        table th { background: #f0f0f0; }
        table tr.new { background: #fffacd; }
    </style>
</head>
<body>
    <div class="container">
        <!-- LOGIN SECTION -->
        <div id="loginSection">
            <h1>Admin Login</h1>
            <div class="form-group">
                <label>Email:</label>
                <input type="email" id="email" placeholder="client@apgroup.com">
            </div>
            <div class="form-group">
                <label>Password:</label>
                <input type="password" id="password" placeholder="Password">
            </div>
            <button onclick="doLogin()">Login</button>
            <div id="loginMsg"></div>
        </div>

        <!-- ADMIN SECTION -->
        <div id="adminSection" class="hidden">
            <h1>Admin Panel</h1>
            <button class="logout" onclick="doLogout()">Logout</button>

            <h2>Update Stats</h2>
            <div class="form-group">
                <label>Total Products:</label>
                <input type="number" id="products" value="92">
            </div>
            <div class="form-group">
                <label>Total Clients:</label>
                <input type="number" id="clients" value="74">
            </div>
            <div class="form-group">
                <label>Transport Vehicles:</label>
                <input type="number" id="vehicles" value="7">
            </div>
            <div class="form-group">
                <label>Employees:</label>
                <input type="number" id="employees" value="20">
            </div>
            <button onclick="doSaveStats()">Save Stats</button>
            <div id="saveMsg"></div>

            <h2>Recent Enquiries</h2>
            <table id="enquiriesTable">
                <thead>
                    <tr>
                        <th>Name</th>
                        <th>Phone</th>
                        <th>Message</th>
                        <th>Time</th>
                    </tr>
                </thead>
                <tbody id="enquiriesBody">
                    <tr><td colspan="4">Loading...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.38.0"></script>
    <script>
        // CONFIG - YOUR VALUES
        const SUPABASE_URL = "https://sqrfapumxcbtiszmmmqkh.supabase.co";
        const SUPABASE_KEY = "sb_publishable_807L6v_PI6bZjsYDEF_uog_z0lDY1Ld";

        let db;
        let seenIds = new Set();

        // Initialize Supabase
        function init() {
            db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
            checkLoggedIn();
        }

        // Check if already logged in
        async function checkLoggedIn() {
            const { data } = await db.auth.getSession();
            if (data.session) {
                showAdmin();
                loadStats();
                loadEnquiries();
            }
        }

        // LOGIN
        async function doLogin() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            if (!email || !password) {
                showMsg('loginMsg', 'Enter email and password', 'error');
                return;
            }

            const { error } = await db.auth.signInWithPassword({ email, password });

            if (error) {
                showMsg('loginMsg', 'Login failed: ' + error.message, 'error');
            } else {
                showAdmin();
                loadStats();
                loadEnquiries();
            }
        }

        // LOGOUT
        async function doLogout() {
            await db.auth.signOut();
            document.getElementById('loginSection').classList.remove('hidden');
            document.getElementById('adminSection').classList.add('hidden');
            document.getElementById('email').value = '';
            document.getElementById('password').value = '';
        }

        // SAVE STATS
        async function doSaveStats() {
            const data = {
                products: parseInt(document.getElementById('products').value),
                clients: parseInt(document.getElementById('clients').value),
                vehicles: parseInt(document.getElementById('vehicles').value),
                employees: parseInt(document.getElementById('employees').value)
            };

            const { error } = await db
                .from('stats')
                .update(data)
                .eq('id', 1);

            if (error) {
                showMsg('saveMsg', 'Error: ' + error.message, 'error');
            } else {
                showMsg('saveMsg', 'Stats saved!', 'success');
            }
        }

        // LOAD STATS
        async function loadStats() {
            const { data, error } = await db
                .from('stats')
                .select('*')
                .eq('id', 1)
                .single();

            if (data) {
                document.getElementById('products').value = data.products;
                document.getElementById('clients').value = data.clients;
                document.getElementById('vehicles').value = data.vehicles;
                document.getElementById('employees').value = data.employees;
            }
        }

        // LOAD ENQUIRIES
        async function loadEnquiries() {
            const { data, error } = await db
                .from('enquiries')
                .select('*')
                .order('created_at', { ascending: false })
                .limit(50);

            const tbody = document.getElementById('enquiriesBody');
            tbody.innerHTML = '';

            if (!data || data.length === 0) {
                tbody.innerHTML = '<tr><td colspan="4">No enquiries yet</td></tr>';
                return;
            }

            data.forEach(row => {
                const isNew = !seenIds.has(row.id);
                if (isNew) seenIds.add(row.id);

                const time = new Date(row.created_at).toLocaleString('en-IN');
                const tr = document.createElement('tr');
                if (isNew) tr.classList.add('new');
                tr.innerHTML = `
                    <td>${row.name}</td>
                    <td>${row.phone}</td>
                    <td>${row.message}</td>
                    <td>${time}</td>
                `;
                tbody.appendChild(tr);
            });

            // Reload every 3 seconds
            setTimeout(loadEnquiries, 3000);
        }

        function showAdmin() {
            document.getElementById('loginSection').classList.add('hidden');
            document.getElementById('adminSection').classList.remove('hidden');
        }

        function showMsg(elementId, text, type) {
            const el = document.getElementById(elementId);
            el.innerHTML = `<div class="msg ${type}">${text}</div>`;
            setTimeout(() => { el.innerHTML = ''; }, 4000);
        }

        // Start when page loads
        window.onload = init;
    </script>
</body>
</html>
