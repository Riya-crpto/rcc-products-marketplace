<!DOCTYPE html>
<html>
<head>
    <title>Admin Panel - AP Group</title>
    <meta charset="UTF-8">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; background: #f0f0f0; }
        .container { max-width: 1000px; margin: 20px auto; background: white; padding: 30px; border-radius: 8px; }
        h1 { color: #333; margin-bottom: 30px; }
        h2 { color: #666; margin-top: 30px; margin-bottom: 15px; font-size: 18px; }

        .login-form, .admin-form { display: none; }
        .login-form.show, .admin-form.show { display: block; }

        input, button { padding: 10px; margin: 5px 0; border: 1px solid #ddd; border-radius: 4px; font-size: 14px; }
        button { background: #007bff; color: white; cursor: pointer; border: none; }
        button:hover { background: #0056b3; }

        .login-form input, .login-form button { width: 100%; max-width: 300px; }

        .category-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap: 20px; margin-top: 10px; }
        .category-box { border: 1px solid #ddd; border-radius: 8px; padding: 15px; }
        .category-box h3 { font-size: 15px; color: #333; margin-bottom: 5px; }
        .category-count { color: #007bff; font-weight: bold; font-size: 22px; margin-bottom: 10px; }
        .category-note { font-size: 12px; color: #888; margin-bottom: 10px; }
        .add-row { display: flex; gap: 6px; margin-bottom: 10px; }
        .add-row input { flex: 1; margin: 0; }
        .add-row button { margin: 0; white-space: nowrap; }

        .item-list { list-style: none; max-height: 180px; overflow-y: auto; border-top: 1px solid #eee; }
        .item-list li { display: flex; justify-content: space-between; align-items: center; padding: 6px 0; border-bottom: 1px solid #eee; font-size: 13px; }
        .item-list li button { background: #dc3545; padding: 3px 8px; font-size: 12px; margin: 0; }
        .item-list li button:hover { background: #a71d2a; }

        .notification-badge {
            position: fixed; top: 20px; right: 20px;
            background: #ff4444; color: white; padding: 12px 20px;
            border-radius: 50px; font-weight: bold; display: none; z-index: 9999;
        }
        .notification-badge.show { display: block; }

        .notification-toast {
            position: fixed; bottom: 20px; right: 20px;
            background: #28a745; color: white; padding: 16px 20px;
            border-radius: 8px; display: none; z-index: 9999; max-width: 300px;
        }
        .notification-toast.show { display: block; }

        .enquiries-table { width: 100%; border-collapse: collapse; margin-top: 20px; font-size: 13px; }
        .enquiries-table th, .enquiries-table td { border: 1px solid #ddd; padding: 8px; text-align: left; }
        .enquiries-table th { background: #f0f0f0; }
        .new-enquiry { background: #fffacd; font-weight: bold; }

        .logout-btn { background: #dc3545; margin-top: 30px; }
        .status { margin: 10px 0; padding: 10px; border-radius: 4px; max-width: 300px; }
        .success { background: #d4edda; color: #155724; }
        .error { background: #f8d7da; color: #721c24; }
    </style>
</head>
<body>
    <div class="notification-badge" id="notificationBadge">
        <span id="badgeCount">0</span> New
    </div>
    <div class="notification-toast" id="notificationToast"></div>

    <div class="container">
        <div class="login-form show">
            <h1>Admin Login</h1>
            <input type="email" id="loginEmail" placeholder="Email">
            <input type="password" id="loginPassword" placeholder="Password">
            <button onclick="login()">Login</button>
            <div id="loginStatus"></div>
        </div>

        <div class="admin-form">
            <h1>Admin Panel</h1>

            <h2>Stats</h2>
            <div class="category-grid">
                <div class="category-box">
                    <h3>Total Clients</h3>
                    <div class="category-count" id="clients-count">0</div>
                    <div class="category-note">Automatic — counts every enquiry form submission. No action needed here.</div>
                </div>

                <div class="category-box">
                    <h3>Products</h3>
                    <div class="category-count" id="products-count">0</div>
                    <div class="add-row">
                        <input type="text" id="products-input" placeholder="Product name">
                        <button onclick="addItem('products')">Add</button>
                    </div>
                    <ul class="item-list" id="products-list"></ul>
                </div>

                <div class="category-box">
                    <h3>Transport Vehicles</h3>
                    <div class="category-count" id="vehicles-count">0</div>
                    <div class="add-row">
                        <input type="text" id="vehicles-input" placeholder="Vehicle name / number">
                        <button onclick="addItem('vehicles')">Add</button>
                    </div>
                    <ul class="item-list" id="vehicles-list"></ul>
                </div>

                <div class="category-box">
                    <h3>Employees</h3>
                    <div class="category-count" id="employees-count">0</div>
                    <div class="add-row">
                        <input type="text" id="employees-input" placeholder="Employee name">
                        <button onclick="addItem('employees')">Add</button>
                    </div>
                    <ul class="item-list" id="employees-list"></ul>
                </div>
            </div>

            <h2>Received Enquiries</h2>
            <table class="enquiries-table">
                <thead>
                    <tr><th>Name</th><th>Phone</th><th>Message</th><th>Time</th></tr>
                </thead>
                <tbody id="enquiriesList">
                    <tr><td colspan="4">Loading...</td></tr>
                </tbody>
            </table>

            <button class="logout-btn" onclick="logout()">Logout</button>
        </div>
    </div>

    <script>
        // ===== Your Supabase project values =====
        const SUPABASE_URL = "https://sqrfapumxcbtiszmmqkh.supabase.co";
        const SUPABASE_ANON_KEY = "sb_publishable_8O7L6v_Pl6bZjsYDEF_uog_z0lDY1Ld";
        // ==========================================

        const CATEGORIES = ['products', 'vehicles', 'employees']; // Clients is automatic, handled separately

        let accessToken = localStorage.getItem('ap_access_token') || null;
        let seenEnquiries = new Set();
        let newEnquiryCount = 0;
        let refreshTimer = null;

        window.addEventListener('DOMContentLoaded', () => {
            if (accessToken) {
                showAdminForm();
                CATEGORIES.forEach(loadCategory);
                loadEnquiries();
            }
        });

        window.login = async function () {
            const email = document.getElementById('loginEmail').value.trim();
            const password = document.getElementById('loginPassword').value;
            const statusEl = document.getElementById('loginStatus');

            if (!email || !password) {
                statusEl.innerHTML = '<div class="status error">Email and password required</div>';
                return;
            }

            statusEl.innerHTML = '<div class="status">Logging in...</div>';

            try {
                const res = await fetch(`${SUPABASE_URL}/auth/v1/token?grant_type=password`, {
                    method: 'POST',
                    headers: { 'apikey': SUPABASE_ANON_KEY, 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                const data = await res.json();

                if (!res.ok) {
                    statusEl.innerHTML = `<div class="status error">Error: ${data.error_description || data.msg || data.message || 'Login failed'}</div>`;
                    return;
                }

                accessToken = data.access_token;
                localStorage.setItem('ap_access_token', accessToken);

                statusEl.innerHTML = '';
                showAdminForm();
                CATEGORIES.forEach(loadCategory);
                loadEnquiries();
            } catch (err) {
                statusEl.innerHTML = `<div class="status error">Network error: ${err.message}</div>`;
            }
        };

        window.logout = function () {
            accessToken = null;
            localStorage.removeItem('ap_access_token');
            if (refreshTimer) clearInterval(refreshTimer);
            showLoginForm();
        };

        function authHeaders(extra = {}) {
            return { 'apikey': SUPABASE_ANON_KEY, 'Authorization': `Bearer ${accessToken}`, ...extra };
        }

        // ----- Products / Vehicles / Employees (manual add/remove) -----

        async function loadCategory(table) {
            try {
                const res = await fetch(`${SUPABASE_URL}/rest/v1/${table}?select=*&order=created_at.desc`, {
                    headers: authHeaders()
                });
                const data = await res.json();
                renderCategory(table, Array.isArray(data) ? data : []);
            } catch (err) {
                console.error(`Load ${table} error:`, err);
            }
        }

        function renderCategory(table, items) {
            document.getElementById(`${table}-count`).textContent = items.length;
            const list = document.getElementById(`${table}-list`);
            list.innerHTML = '';
            items.forEach(item => {
                const li = document.createElement('li');
                const nameSpan = document.createElement('span');
                nameSpan.textContent = item.name;
                const delBtn = document.createElement('button');
                delBtn.textContent = 'Remove';
                delBtn.onclick = () => deleteItem(table, item.id);
                li.appendChild(nameSpan);
                li.appendChild(delBtn);
                list.appendChild(li);
            });
        }

        window.addItem = async function (table) {
            const input = document.getElementById(`${table}-input`);
            const name = input.value.trim();
            if (!name) return;

            try {
                const res = await fetch(`${SUPABASE_URL}/rest/v1/${table}`, {
                    method: 'POST',
                    headers: authHeaders({ 'Content-Type': 'application/json', 'Prefer': 'return=representation' }),
                    body: JSON.stringify({ name })
                });
                if (!res.ok) {
                    const err = await res.json().catch(() => ({}));
                    alert(`Could not add: ${err.message || 'unknown error'}`);
                    return;
                }
                input.value = '';
                loadCategory(table);
            } catch (err) {
                alert(`Network error: ${err.message}`);
            }
        };

        window.deleteItem = async function (table, id) {
            if (!confirm('Remove this item?')) return;
            try {
                const res = await fetch(`${SUPABASE_URL}/rest/v1/${table}?id=eq.${id}`, {
                    method: 'DELETE',
                    headers: authHeaders()
                });
                if (!res.ok) {
                    alert('Could not remove item.');
                    return;
                }
                loadCategory(table);
            } catch (err) {
                alert(`Network error: ${err.message}`);
            }
        };

        // ----- Enquiries (also drives the automatic Clients count) -----

        function loadEnquiries() {
            refreshEnquiries();
            refreshTimer = setInterval(refreshEnquiries, 4000);
        }

        async function refreshEnquiries() {
            try {
                const res = await fetch(`${SUPABASE_URL}/rest/v1/enquiries?select=*&order=created_at.desc&limit=500`, {
                    headers: authHeaders()
                });
                const data = await res.json();

                const enquiriesList = document.getElementById('enquiriesList');
                enquiriesList.innerHTML = '';
                newEnquiryCount = 0;

                if (!Array.isArray(data) || data.length === 0) {
                    enquiriesList.innerHTML = '<tr><td colspan="4">No enquiries yet</td></tr>';
                    document.getElementById('clients-count').textContent = '0';
                    updateBadge();
                    return;
                }

                // Clients count = number of enquiry submissions, updates automatically
                document.getElementById('clients-count').textContent = data.length;

                data.forEach(enquiry => {
                    const isNew = !seenEnquiries.has(enquiry.id);
                    if (isNew) {
                        seenEnquiries.add(enquiry.id);
                        newEnquiryCount++;
                        showNotification(enquiry.name, enquiry.phone);
                    }

                    const time = new Date(enquiry.created_at).toLocaleString('en-IN');
                    const rowClass = isNew ? 'new-enquiry' : '';
                    enquiriesList.innerHTML += `
                        <tr class="${rowClass}">
                            <td>${escapeHtml(enquiry.name)}</td>
                            <td>${escapeHtml(enquiry.phone)}</td>
                            <td>${escapeHtml(enquiry.message)}</td>
                            <td>${time}</td>
                        </tr>`;
                });

                updateBadge();
            } catch (err) {
                console.error('Load enquiries error:', err);
            }
        }

        function escapeHtml(str) {
            if (!str) return '';
            return String(str).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
        }

        function showNotification(name, phone) {
            const toast = document.getElementById('notificationToast');
            toast.innerHTML = `<strong>✓ New Enquiry!</strong><br>${escapeHtml(name)} (${escapeHtml(phone)})`;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 5000);
        }

        function updateBadge() {
            const badge = document.getElementById('notificationBadge');
            if (newEnquiryCount > 0) {
                document.getElementById('badgeCount').textContent = newEnquiryCount;
                badge.classList.add('show');
            } else {
                badge.classList.remove('show');
            }
        }

        function showAdminForm() {
            document.querySelector('.login-form').classList.remove('show');
            document.querySelector('.admin-form').classList.add('show');
        }

        function showLoginForm() {
            document.querySelector('.admin-form').classList.remove('show');
            document.querySelector('.login-form').classList.add('show');
        }
    </script>
</body>
</html>
